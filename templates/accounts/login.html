{% extends 'base.html' %}

{% block content %}
<div class="glass p-8 max-w-md mx-auto mt-20">
    <h2 class="text-3xl font-bold mb-6 text-center">Operator Login</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block mb-1">Username</label>
            <input type="text" name="username" class="w-full p-2 rounded bg-white bg-opacity-20 border border-gray-300 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-white">
        </div>
        <div>
            <label class="block mb-1">Password</label>
            <input type="password" name="password" class="w-full p-2 rounded bg-white bg-opacity-20 border border-gray-300 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-white">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded transition">Login</button>
    </form>
</div>
{% endblock %}
