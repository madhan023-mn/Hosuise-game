{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] px-4">
    <div class="glass p-8 md:p-12 w-full max-w-md text-center transform transition duration-500 hover:scale-105">
        <h2 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 mb-2">Join a Game</h2>
        <p class="text-gray-300 mb-8 text-sm md:text-base">Enter the Game Session ID provided by your Operator</p>
        
        {% if error %}
        <div class="bg-red-500 bg-opacity-20 border border-red-500 text-red-100 p-3 rounded mb-6 text-sm">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <input type="text" name="game_code" placeholder="e.g. A1B2C3" required autocomplete="off" class="w-full bg-black bg-opacity-50 text-white text-center text-2xl tracking-[0.2em] font-mono p-4 rounded-xl outline-none border border-indigo-500 focus:border-green-400 focus:ring-2 focus:ring-green-400 transition placeholder-gray-500 uppercase">
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(34,197,94,0.5)] transition transform hover:scale-105 text-lg">
                🚀 ENTER GAME
            </button>
        </form>
        
        <div class="mt-8 pt-6 border-t border-white border-opacity-20">
            <p class="text-gray-400 text-xs md:text-sm">Are you a Game Operator?</p>
            <a href="{% url 'login' %}" class="inline-block mt-2 text-indigo-300 hover:text-white transition text-sm font-semibold underline">Operator Login</a>
        </div>
    </div>
</div>
{% endblock %}
